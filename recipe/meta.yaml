{% set name = "pyfilemanager" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyfilemanager-{{ version }}.tar.gz
  sha256: e826ac9c78d0726f3dde9fa40d3138ef7bbf0cab91f85c403bfc2265993bc689

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }},<4.0

test:
  imports:
    - pyfilemanager
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/praneethnamburi/pyfilemanager
  summary: Easy to use file search and file path management in python.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://pyfilemanager.readthedocs.io
  dev_url: https://github.com/praneethnamburi/pyfilemanager

extra:
  recipe-maintainers:
    - praneethnamburi
